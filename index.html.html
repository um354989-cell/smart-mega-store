<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Mega Store</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-black text-white p-4 flex justify-between">
  <h1 class="font-bold text-lg">🛒 Smart Mega Store</h1>
  <div>❤️ Wishlist: <span id="wish">0</span></div>
</header>

<input id="search" oninput="smartSearch()" 
class="m-4 p-3 border rounded w-[95%]" 
placeholder="Search products..." />

<div id="suggestions" class="px-4 text-gray-600 text-sm"></div>

<div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4"></div>

<script>
let wishlist = [];

/* PRODUCT NAMES */
const names = [
"iPhone 14 Pro","Samsung Galaxy S23","Nike Air Max","Adidas Hoodie",
"Gaming Laptop","4K Smart TV","Bluetooth Headphones","Office Chair",
"Wooden Desk","Running Shoes","Backpack","Smart Watch",
"Canon Camera","PlayStation Console","Xbox Controller",
"Wireless Mouse","Mechanical Keyboard","LED Monitor","Tablet Pro",
"Fitness Tracker",
"Pizza","Burger","Fried Chicken","Pasta","Sushi",
"Chocolate Cake","Ice Cream","Coffee","Juice","Sandwich"
];

const categories = ["tech","fashion","home","sports","gaming","food"];

/* FOOD IMAGE MATCHING */
function foodImage(name){
  const map = {
    pizza:"https://images.unsplash.com/photo-1542281286-9e0a16bb7366",
    burger:"https://images.unsplash.com/photo-1550547660-d9450f859349",
    chicken:"https://images.unsplash.com/photo-1562967916-eb82221dfb36",
    pasta:"https://images.unsplash.com/photo-1525755662778-989d0524087e",
    sushi:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c",
    cake:"https://images.unsplash.com/photo-1578985545062-69928b1d9587",
    ice:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
    coffee:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
    juice:"https://images.unsplash.com/photo-1553531889-56cc480ac5cb",
    sandwich:"https://images.unsplash.com/photo-1550547660-d9450f859349"
  };

  let lower = name.toLowerCase();
  for(let key in map){
    if(lower.includes(key)) return map[key];
  }
  return null;
}

/* IMAGE ENGINE */
function getImage(id,name){
  let food = foodImage(name);
  if(food) return food;

  return `https://picsum.photos/seed/${name.replace(/\s/g,'')+id}/300/300`;
}

/* PRODUCT GENERATOR */
function generateProduct(i){
  let base = names[i % names.length];
  let cat = categories[i % categories.length];

  return {
    id: i,
    name: base + " " + (i+1),
    category: cat,
    price: (i % 200) * 150 + 999,
    img: getImage(i, base)
  };
}

/* SEARCH ENGINE */
function searchEngine(query){
  if(!query) return [];

  let results = [];

  for(let i=0; i<100000; i++){
    let p = generateProduct(i);

    if(p.name.toLowerCase().includes(query.toLowerCase())){
      results.push(p);
    }

    if(results.length >= 24) break;
  }

  return results;
}

/* SUGGESTIONS */
function suggestions(query){
  if(!query) return [];
  return searchEngine(query).slice(0,5).map(p=>p.name);
}

/* WISHLIST */
function addWish(id){
  wishlist.push(id);
  document.getElementById("wish").innerText = wishlist.length;
}

/* RENDER */
function smartSearch(){
  let q = document.getElementById("search").value;

  let results = searchEngine(q);

  document.getElementById("suggestions").innerHTML =
    q ? "Suggestions: " + suggestions(q).join(" • ") : "";

  document.getElementById("grid").innerHTML =
    results.map(p=>`
      <div class="bg-white p-3 shadow rounded">
        <img src="${p.img}" class="h-36 w-full object-cover rounded">
        <h3 class="font-semibold mt-2">${p.name}</h3>
        <p class="text-sm">Ksh ${p.price}</p>

        <button onclick="addWish(${p.id})"
        class="text-sm underline w-full mt-2">
          ❤️ Wishlist
        </button>
      </div>
    `).join("");
}
</script>

</body>
</html>
